# Deploy com imagem pré-buildada (CI → GHCR). Uso: RADARZAP_IMAGE=ghcr.io/owner/radarzap:sha docker compose -f docker-compose.deploy.yml up -d
version: '3.8'

services:
  app:
    image: ${RADARZAP_IMAGE:?defina RADARZAP_IMAGE}
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MONGODB_URL: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/discord-whatsapp?authSource=admin
      REDIS_URL: redis://redis:6379
    volumes:
      - radarzap-sessions:/app/sessions
      - radarzap-media:/app/media
      - radarzap-logs:/app/logs
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mongodb-data:
  redis-data:
  radarzap-sessions:
  radarzap-media:
  radarzap-logs:
