name: Coolify status check

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Coolify vs legacy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PUBLIC_HOST: '151-247-210-180.sslip.io'
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,PUBLIC_HOST
          script_stop: false
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            git fetch origin main -q 2>/dev/null || true
            git reset --hard origin/main -q 2>/dev/null || true
            sudo bash scripts/vps-coolify-status.sh || true
