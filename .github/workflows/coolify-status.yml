name: Coolify status check

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Coolify vs legacy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PUBLIC_HOST: app.radarchat.com.br
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,PUBLIC_HOST
          script_stop: false
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            git fetch origin main -q 2>/dev/null || true
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            git fetch origin "${DEPLOY_BRANCH}" -q 2>/dev/null || true
            git reset --hard "origin/${DEPLOY_BRANCH}" -q 2>/dev/null || git reset --hard origin/main -q 2>/dev/null || true
            sudo bash scripts/vps-coolify-status.sh || true
            sudo bash scripts/vps-host-metrics.sh || true
            if [[ -f scripts/vps-install-host-metrics-cron.sh ]]; then
              sudo -E DEPLOY_PATH="${DEPLOY_PATH:-/opt/radarzap}" PUBLIC_HOST="${PUBLIC_HOST}" \
                bash scripts/vps-install-host-metrics-cron.sh || true
            fi
