# Restaura HTTPS sslip.io (Caddy) + stack legado enquanto Coolify não roteia o domínio.
name: Restore sslip.io HTTPS

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore app + HTTPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            bash scripts/vps-git-sync-main.sh
            sudo bash scripts/vps-restore-sslip-https.sh
