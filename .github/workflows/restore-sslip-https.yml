# Restaura HTTPS sslip.io (Caddy) + stack legado enquanto Coolify não roteia o domínio.
name: Restore sslip.io HTTPS

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore app + HTTPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            for attempt in 1 2 3 4 5; do
              if git fetch origin +refs/heads/main:refs/remotes/origin/main -q 2>/dev/null; then
                git reset --hard origin/main -q
                break
              fi
              sleep 2
            done
            if [[ ! -f scripts/vps-restore-sslip-https.sh ]]; then
              git fetch origin main --force -q
              git reset --hard origin/main -q
            fi
            sudo bash scripts/vps-restore-sslip-https.sh
