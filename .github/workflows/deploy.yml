# Build GHCR + deploy no stack Coolify (produção VPS ZAP).
# Push em main: deploy leve (pull + up app). Republicação full só manual.
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mocker/**'
      - 'data/**'
      - '.cursor/**'
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Modo de deploy
        required: true
        default: app-only
        type: choice
        options:
          - app-only
          - full-republish
      target:
        description: Ambiente de destino
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.target || 'production' }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.monolith
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip deploy]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Coolify via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_HOST: app.radarchat.com.br
          TRAEFIK_EXTRA_HOSTS: 151-247-210-180.sslip.io
          COOLIFY_SERVICE_UUID: h143brhw5f8tgfj9trj0f3bd
          DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_mode || 'app-only' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          envs: GHCR_PAT,DEPLOY_PATH,IMAGE,REPO_OWNER,PUBLIC_HOST,TRAEFIK_EXTRA_HOSTS,COOLIFY_SERVICE_UUID,DEPLOY_MODE
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch origin main -q && git reset --hard origin/main -q
            export USE_SUDO_DOCKER=1
            export PUBLIC_HOST="${PUBLIC_HOST:-app.radarchat.com.br}"
            export TRAEFIK_EXTRA_HOSTS="${TRAEFIK_EXTRA_HOSTS:-151-247-210-180.sslip.io}"
            export COOLIFY_SERVICE_UUID="${COOLIFY_SERVICE_UUID:-h143brhw5f8tgfj9trj0f3bd}"
            export RADARZAP_IMAGE="$IMAGE"
            if [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | sudo docker login ghcr.io -u "$REPO_OWNER" --password-stdin
            fi
            if [ "${DEPLOY_MODE:-app-only}" = "full-republish" ]; then
              echo "[deploy] Modo full-republish — scripts/vps-fix-coolify-ssl.sh"
              sudo -E bash scripts/vps-fix-coolify-ssl.sh
            else
              echo "[deploy] Modo app-only — scripts/vps-coolify-deploy-app.sh"
              sudo -E bash scripts/vps-coolify-deploy-app.sh
            fi
