# Build na nuvem (GHCR) + deploy no VPS via SSH (~3–5 min no servidor).
# Gatilhos: push na main (código), tag v*, ou manual (Actions → Deploy).
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mocker/**'
      - 'data/**'
      - '.cursor/**'
  workflow_dispatch:
    inputs:
      target:
        description: Ambiente de destino
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.target || 'production' }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.monolith
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (pull GHCR + compose)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_PAT,DEPLOY_PATH,IMAGE,REPO_OWNER
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            export USE_SUDO_DOCKER=1
            export ENV_FILE=.env
            if [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | sudo docker login ghcr.io -u "$REPO_OWNER" --password-stdin
            fi
            export RADARZAP_IMAGE="$IMAGE"
            bash scripts/deploy-remote.sh "$RADARZAP_IMAGE"
