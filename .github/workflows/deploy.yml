# Build GHCR + deploy no stack Coolify (produção VPS ZAP).
# Push em main: deploy leve (pull + up app). Republicação full só manual.
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mocker/**'
      - 'data/**'
      - '.cursor/**'
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Modo de deploy
        required: true
        default: app-only
        type: choice
        options:
          - app-only
          - full-republish
      target:
        description: Ambiente de destino
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.target || 'production' }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.monolith
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip deploy]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy Coolify via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
          REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_HOST: app.radarchat.com.br
          TRAEFIK_EXTRA_HOSTS: 151-247-210-180.sslip.io
          COOLIFY_SERVICE_UUID: h143brhw5f8tgfj9trj0f3bd
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || 'app-only' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          envs: GHCR_PAT,DEPLOY_PATH,IMAGE,REPO_OWNER,PUBLIC_HOST,TRAEFIK_EXTRA_HOSTS,COOLIFY_SERVICE_UUID,DEPLOY_MODE
          script_stop: true
          script: |
            export DEPLOY_PATH IMAGE REPO_OWNER GHCR_PAT PUBLIC_HOST TRAEFIK_EXTRA_HOSTS COOLIFY_SERVICE_UUID DEPLOY_MODE
            export RADARCHAT_IMAGE="$IMAGE"
            # Limpeza antes do pull (funciona mesmo se o repo na VPS ainda nao tiver o script novo)
            sudo docker image prune -af 2>/dev/null || true
            sudo docker container prune -f 2>/dev/null || true
            sudo docker builder prune -af 2>/dev/null || true
            if [[ -f "${DEPLOY_PATH}/scripts/vps-docker-prune-safe.sh" ]]; then
              sudo -E DEPLOY_PATH="${DEPLOY_PATH}" bash "${DEPLOY_PATH}/scripts/vps-docker-prune-safe.sh" --aggressive || true
            fi
            exec bash "${DEPLOY_PATH}/scripts/vps-deploy-main.sh"
