# Corrige stack Exited + SSL (compose GHCR + redeploy).
name: Fix Coolify SSL (RadarZap)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix SSL via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,GHCR_PAT
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            for attempt in 1 2 3 4 5; do
              if git fetch origin +refs/heads/main:refs/remotes/origin/main -q 2>/dev/null; then
                git reset --hard origin/main -q
                break
              fi
              sleep 2
            done
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq openssl
            sudo -E bash scripts/vps-fix-coolify-ssl.sh
