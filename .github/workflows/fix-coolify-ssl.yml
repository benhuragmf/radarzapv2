# Corrige stack Exited + SSL (compose GHCR + redeploy).
name: Fix Coolify SSL (RadarChat)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fix SSL via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          PUBLIC_HOST: app.radarchat.com.br
          TRAEFIK_EXTRA_HOSTS: 151-247-210-180.sslip.io
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,GHCR_PAT,PUBLIC_HOST,TRAEFIK_EXTRA_HOSTS,DISCORD_TOKEN,DISCORD_CLIENT_ID,DISCORD_CLIENT_SECRET,DISCORD_GUILD_ID
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarchat}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            for attempt in 1 2 3 4 5; do
              if git fetch origin "+refs/heads/${DEPLOY_BRANCH}:refs/remotes/origin/${DEPLOY_BRANCH}" -q 2>/dev/null; then
                git reset --hard "origin/${DEPLOY_BRANCH}" -q
                break
              fi
              sleep 2
            done
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq openssl
            sudo -E bash scripts/vps-fix-coolify-ssl.sh
