# Remove stack GHCR legado do VPS (radarzap-app/mongodb/redis) — volumes preservados.
name: Purge legacy stack (VPS)

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Purge legacy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            git fetch origin main -q && git reset --hard origin/main -q
            sudo -E bash scripts/vps-purge-legacy-stack.sh
