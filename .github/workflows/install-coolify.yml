# Instala Coolify na VPS de produção (manual). Não altera stack Radar Chat legado.
name: Install Coolify (VPS)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite INSTALL para confirmar instalação na VPS de produção'
        required: true
        type: string

jobs:
  install:
    if: github.event.inputs.confirm == 'INSTALL'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Coolify via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ROOT_USER_EMAIL: ${{ secrets.COOLIFY_ROOT_EMAIL }}
          ROOT_USER_PASSWORD: ${{ secrets.COOLIFY_ROOT_PASSWORD }}
          ROOT_USERNAME: ${{ secrets.COOLIFY_ROOT_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,ROOT_USER_EMAIL,ROOT_USER_PASSWORD,ROOT_USERNAME
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarchat}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-layout-v3}"
            git fetch origin "${DEPLOY_BRANCH}" -q && git reset --hard "origin/${DEPLOY_BRANCH}" -q
            export USE_SUDO_DOCKER=1
            sudo bash scripts/vps-install-coolify.sh
