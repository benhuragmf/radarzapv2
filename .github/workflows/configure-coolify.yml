# Configura resource RadarZap no Coolify (projeto, compose, env, deploy).
name: Configure Coolify (RadarZap)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite CONFIGURE para confirmar'
        required: true
        type: string
      migrate_legacy:
        description: 'Parar GHCR legado e fazer deploy no Coolify (1=sim)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'

jobs:
  configure:
    if: github.event.inputs.confirm == 'CONFIGURE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure RadarZap on Coolify via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          MIGRATE_LEGACY: ${{ github.event.inputs.migrate_legacy }}
          COOLIFY_ROOT_EMAIL: ${{ secrets.COOLIFY_ROOT_EMAIL }}
          COOLIFY_ROOT_PASSWORD: ${{ secrets.COOLIFY_ROOT_PASSWORD }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          COOLIFY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          RADARGAMER_SSH_PRIVATE_KEY: ${{ secrets.RADARGAMER_SSH_KEY }}
          PUBLIC_HOST: app.radarchat.com.br
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,MIGRATE_LEGACY,COOLIFY_ROOT_EMAIL,COOLIFY_ROOT_PASSWORD,GHCR_PAT,COOLIFY_SSH_PRIVATE_KEY,RADARGAMER_SSH_PRIVATE_KEY,PUBLIC_HOST
          script_stop: true
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/radarzap}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-layout-v3}"
            for attempt in 1 2 3 4 5; do
              if git fetch origin "+refs/heads/${DEPLOY_BRANCH}:refs/remotes/origin/${DEPLOY_BRANCH}" -q 2>/dev/null; then
                git reset --hard "origin/${DEPLOY_BRANCH}" -q
                break
              fi
              sleep 2
            done
            if [[ ! -f scripts/vps-configure-coolify-radarzap.sh ]]; then
              git fetch origin "${DEPLOY_BRANCH}" --force -q
              git reset --hard "origin/${DEPLOY_BRANCH}" -q
            fi
            for attempt in 1 2 3 4 5 6; do
              if sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq jq openssl; then
                break
              fi
              echo "apt lock, retry $attempt"
              sleep 15
            done
            if [[ -z "${RADARGAMER_SSH_PRIVATE_KEY:-}" ]]; then
              export RADARGAMER_SSH_PRIVATE_KEY="${COOLIFY_SSH_PRIVATE_KEY}"
            fi
            sudo -E bash scripts/vps-configure-coolify-radarzap.sh
            if [[ "${MIGRATE_LEGACY:-1}" != "1" ]]; then
              sudo bash scripts/vps-restore-sslip-https.sh || true
            fi
