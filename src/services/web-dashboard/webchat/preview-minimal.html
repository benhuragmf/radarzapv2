<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview minimalista — RadarZap WebChat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
      background: #fff;
      color: #18181b;
    }
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 80px 28px 160px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 400;
      margin: 0 0 16px;
      letter-spacing: -0.02em;
    }
    p {
      font-family: system-ui, sans-serif;
      color: #71717a;
      line-height: 1.7;
      font-size: 1rem;
    }
    .line {
      width: 48px;
      height: 1px;
      background: #d4d4d8;
      margin: 32px auto;
    }
    .note {
      font-family: system-ui, sans-serif;
      font-size: .8rem;
      color: #a1a1aa;
      margin-top: 40px;
    }
    code {
      font-family: ui-monospace, monospace;
      font-size: .85em;
      background: #f4f4f5;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Uma pergunta?</h1>
    <p>Fale conosco pelo chat. Sem formulários longos — só o essencial.</p>
    <div class="line"></div>
    <p id="rz-preview-status">Carregando…</p>
    <p class="note">Chave <code id="rz-preview-key">—</code></p>
  </main>
  <script src="/webchat/preview-loader.js"></script>
</body>
</html>
