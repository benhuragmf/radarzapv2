<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RadarZap WebChat — demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #f0f4ff 0%, #fff 45%);
      color: #111827;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 120px;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    p { line-height: 1.6; color: #4b5563; }
    code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .hint {
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Site de exemplo</h1>
    <p>
      Esta página simula um site externo com o widget RadarZap. Abra com
      <code>?key=wck_SUA_CHAVE</code> na URL (copie a chave em Chat do site → Widgets).
    </p>
    <div class="hint" id="status">Aguardando parâmetro <code>key</code>…</div>
  </main>
  <script>
    (function () {
      var key = new URLSearchParams(location.search).get('key');
      var status = document.getElementById('status');
      if (!key) return;
      status.textContent = 'Widget carregado — use o botão no canto da tela.';
      var base = document.currentScript && document.currentScript.src
        ? document.currentScript.src.replace(/\/webchat\/demo\.html.*$/, '')
        : '';
      var s = document.createElement('script');
      s.src = (base || '') + '/webchat/widget.js';
      s.setAttribute('data-widget-key', key);
      if (base) s.setAttribute('data-base-url', base);
      s.async = true;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
