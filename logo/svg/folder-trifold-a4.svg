    <text x="80" y="215" class="brand" font-size="52" fill="#0F172A">Organização</text>
    <text x="80" y="275" class="brand" font-size="52" fill="#0F172A">no atendimento</text>
    <text x="80" y="355" class="tag" font-size="24" fill="#475569" text-anchor="start">
<tspan x="80" dy="0">Status do atendente, supervisão, fila,</tspan>
<tspan x="80" dy="34">contatos e histórico para reduzir perda</tspan>
<tspan x="80" dy="34">de conversas.</tspan>
</text>
    <rect x="80" y="505" width="420" height="82" rx="25" fill="url(#g1)" opacity="0.96"/>
    <text x="290" y="557" text-anchor="middle" class="small" font-size="25" fill="#fff">WhatsApp + WebChat + IA</text>
    
    <text x="664.6666666666666" y="130" class="small" font-size="30" fill="#2563EB">COMO FUNCIONA</text>
