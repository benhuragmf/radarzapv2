        <text x="739.6666666666666" y="531" class="small" font-size="30" fill="#0F172A">RadarChat organiza</text>
        <text x="739.6666666666666" y="569" class="tag" font-size="22" fill="#475569">Fila, origem e responsável.</text>
        
        <circle cx="689.6666666666666" cy="680" r="30" fill="url(#g1)"/>
        <text x="689.6666666666666" y="689" text-anchor="middle" class="small" font-size="26" fill="#fff">3</text>
        <text x="739.6666666666666" y="676" class="small" font-size="30" fill="#0F172A">Equipe resolve</text>
        <text x="739.6666666666666" y="714" class="tag" font-size="22" fill="#475569">Atendente, supervisor e IA.</text>
        
        <circle cx="689.6666666666666" cy="825" r="30" fill="url(#g1)"/>
        <text x="689.6666666666666" y="834" text-anchor="middle" class="small" font-size="26" fill="#fff">4</text>
        <text x="739.6666666666666" y="821" class="small" font-size="30" fill="#0F172A">Lead evolui</text>
        <text x="739.6666666666666" y="859" class="tag" font-size="22" fill="#475569">Kanban, tag e acompanhamento.</text>
        
    <g transform="translate(1369.3333333333333,72) scale(0.7727272727272727)" filter="url(#softShadow)">
