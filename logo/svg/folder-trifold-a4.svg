    <text x="1461.3333333333333" y="315" class="brand" font-size="56" text-anchor="middle"><tspan fill="#0F172A">Radar</tspan><tspan fill="#2563EB">Chat</tspan></text>
    <text x="1284.3333333333333" y="480" class="brand" font-size="54" fill="#0F172A">Atendimento</text>
    <text x="1284.3333333333333" y="542" class="brand" font-size="54" fill="#0F172A">profissional</text>
    <text x="1284.3333333333333" y="620" class="tag" font-size="25" fill="#475569" text-anchor="start">
<tspan x="1284.3333333333333" dy="0">Atendimento inteligente em tempo</tspan>
<tspan x="1284.3333333333333" dy="34">real</tspan>
</text>
    <rect x="1284.3333333333333" y="745" width="450" height="110" rx="34" fill="url(#g1)"/>
