<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1754" height="1240" viewBox="0 0 1754 1240" role="img" aria-label="RadarChat logo">
  <defs>
    <style>
      .brand { font-family: DejaVu Sans, Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: -1.5px; }
      .tag { font-family: DejaVu Sans, Arial, Helvetica, sans-serif; font-weight: 500; }
      .small { font-family: DejaVu Sans, Arial, Helvetica, sans-serif; font-weight: 700; }
    </style>
    
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
